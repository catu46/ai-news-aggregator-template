# =============================================================================
# Cold-start examples — per user.
# They bootstrap TWO things:
#   1) the curator's few-shot (it learns your taste from the 1st message);
#   2) the recall archive (they enter as preloaded votes: gold=👍 / noise=👎,
#      origin='seed'), so /buscar already works on day 1.
#
# Can be a link OR pasted text. 3-5 of each is enough.
#
# HOW TO USE: copy this file to `config/seeds.yaml` and replace the
# placeholders with your own examples. This .example only has placeholders.
# =============================================================================

users:
  owner:
    gold:        # "gold" — exactly what you WANT to receive
      - text: "<paste a dense post/discussion you'd love to receive>"
        # url: "https://..."     # optional, but helps
      - text: "<another gold example>"
      - text: "<another gold example>"

    noise:       # "noise" — what the curator SHOULD reject
      - text: "<paste a basic tutorial / corporate hype / clickbait>"
      - text: "<another noise example>"
      - text: "<another noise example>"
