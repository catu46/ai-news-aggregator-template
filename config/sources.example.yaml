# =============================================================================
# Monitored sources — per user (multi-tenant-ready).
# The "operator" (you) is just the "owner" user. To add another person,
# create a new block with their telegram_user_id.
#
# Find your telegram_user_id: send /start to the bot (it logs the id) or
# talk to @userinfobot on Telegram.
#
# HOW TO USE: copy this file to `config/sources.yaml` and fill it with
# your own values. This .example only has placeholders.
# =============================================================================

users:
  owner:
    telegram_user_id: 000000000        # <- your Telegram id (get it from @userinfobot)
    display_name: "Your Name"

    reddit:
      # subreddits you follow (without the "r/")
      subreddits:
        - LocalLLaMA
        - MachineLearning
        - dataengineering
        # - add/remove as you like

    x:
      # specific accounts (without the "@")
      accounts:
        - karpathy
        - simonw
        # - add/remove as you like
      # advanced searches — X operators: from:, OR, min_faves:, lang:, -filter:replies
      searches:
        - '("autonomous agents" OR agentic) min_faves:50 lang:en -filter:replies'
        - '(RAG OR "vector search") min_faves:50 lang:en -filter:replies'
        # operators: from:, OR, min_faves:, lang:, -filter:replies — edit as you like

    github:
      # trending repos by topic (Search API). Each item is a query/topic.
      # Accepts keywords + GitHub operators (language:, topic:, etc.).
      queries:
        - "AI agents"
        - "MCP server"
        # - add/remove as you like

  # --- Example of a 2nd person (uncomment to enable) ---
  # friend1:
  #   telegram_user_id: 111111111
  #   display_name: "John Doe"
  #   reddit:
  #     subreddits: [LocalLLaMA, rust]
  #   x:
  #     accounts: [karpathy]
  #     searches: []
